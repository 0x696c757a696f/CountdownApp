name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  windows-python-314:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Run tests
        run: python -m unittest discover -v
